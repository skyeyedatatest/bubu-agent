<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas 画笔工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.12);
            max-width: 900px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: #fff;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #f093fb, #f5576c, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .sub {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 14px 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tool-group label {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
        }

        .color-picker-wrap {
            position: relative;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            flex-shrink: 0;
        }

        .color-picker-wrap:hover {
            transform: scale(1.1);
            border-color: rgba(255,255,255,0.6);
        }

        .color-picker-wrap input[type="color"] {
            position: absolute;
            top: -4px;
            left: -4px;
            width: calc(100% + 8px);
            height: calc(100% + 8px);
            border: none;
            padding: 0;
            cursor: pointer;
            background: none;
        }

        .size-display {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            min-width: 36px;
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 4px 8px;
            border-radius: 8px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 120px;
            height: 4px;
            border-radius: 2px;
            background: linear-gradient(90deg, #4facfe, #f5576c);
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: transform 0.15s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-clear {
            background: linear-gradient(135deg, #f5576c, #ff6b6b);
            color: #fff;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.3);
        }

        .btn-clear:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.45);
        }

        .btn-clear:active {
            transform: translateY(0);
        }

        .btn-eraser {
            background: linear-gradient(135deg, #636e72, #b2bec3);
            color: #fff;
            box-shadow: 0 4px 15px rgba(99, 110, 114, 0.3);
        }

        .btn-eraser:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 110, 114, 0.45);
        }

        .btn-eraser.active {
            background: linear-gradient(135deg, #fdcb6e, #e17055);
            box-shadow: 0 4px 15px rgba(253, 203, 110, 0.4);
        }

        .btn-undo {
            background: linear-gradient(135deg, #a29bfe, #6c5ce7);
            color: #fff;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        .btn-undo:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.45);
        }

        .btn-download {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.3);
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 184, 148, 0.45);
        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 184, 148, 0.45);
        }

        /* ===== 录制按钮 ===== */
        .btn-record {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
        }
        .btn-record:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.45);
        }
        .btn-record:active {
            transform: translateY(0);
        }

        /* 录制中脉冲动画 */
        .btn-record.recording {
            animation: pulse-record 1.2s ease-in-out infinite;
        }
        @keyframes pulse-record {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.6); }
            50% { box-shadow: 0 0 0 12px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        /* ===== 播放按钮 ===== */
        .btn-play {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: #fff;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
        }
        .btn-play:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(39, 174, 96, 0.45);
        }
        .btn-play:active {
            transform: translateY(0);
        }
        .btn-play.playing {
            animation: pulse-play 1s ease-in-out infinite;
        }
        @keyframes pulse-play {
            0% { box-shadow: 0 0 0 0 rgba(39, 174, 96, 0.5); }
            50% { box-shadow: 0 0 0 10px rgba(39, 174, 96, 0); }
            100% { box-shadow: 0 0 0 0 rgba(39, 174, 96, 0); }
        }

        /* ===== 速度按钮组 ===== */
        .speed-group {
            display: flex;
            gap: 4px;
        }
        .btn-speed {
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.6);
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
        }
        .btn-speed:hover {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }
        .btn-speed.active {
            background: linear-gradient(135deg, #f093fb, #4facfe);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(79, 172, 254, 0.3);
        }

        .canvas-wrap {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: #fff;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.1);
            border: 2px solid rgba(255,255,255,0.1);
        }

        .canvas-wrap canvas {
            display: block;
            width: 100%;
            height: auto;
            cursor: crosshair;
            touch-action: none;
        }

        .canvas-info {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            color: rgba(255,255,255,0.35);
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        .separator {
            width: 1px;
            height: 30px;
            background: rgba(255,255,255,0.1);
        }

        @media (max-width: 640px) {
            .container {
                padding: 16px;
            }
            .toolbar {
                gap: 10px;
                padding: 12px 14px;
            }
            .header h1 {
                font-size: 20px;
            }
            input[type="range"] {
                width: 80px;
            }
            .separator {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 Canvas 画笔</h1>
            <span class="sub">draw · paint · create</span>
        </div>

        <div class="toolbar">
            <div class="tool-group">
                <label>颜色</label>
                <div class="color-picker-wrap" id="colorPreview">
                    <input type="color" id="colorPicker" value="#4facfe">
                </div>
            </div>

            <div class="separator"></div>

            <div class="tool-group">
                <label>粗细</label>
                <input type="range" id="brushSize" min="1" max="50" value="5">
                <span class="size-display" id="sizeDisplay">5</span>
            </div>

            <div class="separator"></div>

            <button class="btn btn-undo" id="undoBtn">↩ 撤销</button>
            <button class="btn btn-eraser" id="eraserBtn">🧹 橡皮擦</button>
            <button class="btn btn-clear" id="clearBtn">🗑 清空画布</button>
            <button class="btn btn-download" id="downloadBtn">⬇ 保存</button>

            <div class="separator"></div>

            <button class="btn btn-record" id="recordBtn">⏺ 录制</button>
            <button class="btn btn-play" id="playBtn">▶ 播放</button>
            <div class="speed-group">
                <button class="btn-speed active" id="speed1x">1x</button>
                <button class="btn-speed" id="speed05x">0.5x</button>
                <button class="btn-speed" id="speed2x">2x</button>
            </div>
        </div>

        <div class="canvas-wrap">
            <canvas id="canvas" width="800" height="500"></canvas>
        </div>

        <div class="canvas-info">
            <span>按住鼠标拖动绘制 · 右键拖动可移动</span>
            <span id="coordDisplay">🖱 0, 0</span>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            const colorPicker = document.getElementById('colorPicker');
            const colorPreview = document.getElementById('colorPreview');
            const brushSize = document.getElementById('brushSize');
            const sizeDisplay = document.getElementById('sizeDisplay');
            const clearBtn = document.getElementById('clearBtn');
            const undoBtn = document.getElementById('undoBtn');
            const eraserBtn = document.getElementById('eraserBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const coordDisplay = document.getElementById('coordDisplay');
            const recordBtn = document.getElementById('recordBtn');
            const playBtn = document.getElementById('playBtn');
            const speed05x = document.getElementById('speed05x');
            const speed1x = document.getElementById('speed1x');
            const speed2x = document.getElementById('speed2x');

            // ---------- 状态 ----------
            let isDrawing = false;
            let isEraser = false;
            let lastX = 0;
            let lastY = 0;

            // ---------- 录制 / 回放 状态 ----------
            const recordedStrokes = []; // Stroke[] 每个 Stroke = { points: [{x,y,time}], color, size, isEraser }
            let isRecording = false;
            let isPlaying = false;
            let currentStroke = null;
            let playbackSpeed = 1;
            let playbackStartTime = 0;

            // ---------- 历史记录 (撤销) ----------
            const MAX_HISTORY = 30;
            const historyStack = [];
            let historyIndex = -1; // -1 表示尚未保存任何状态

            // ---------- 初始化画布 ----------
            function initCanvas() {
                // 白色背景
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                saveState();
            }

            // ---------- 状态保存 / 撤销 ----------
            function saveState() {
                // 如果当前不在最新位置，裁掉后面的历史
                if (historyIndex < historyStack.length - 1) {
                    historyStack.splice(historyIndex + 1);
                }
                const dataUrl = canvas.toDataURL();
                historyStack.push(dataUrl);
                if (historyStack.length > MAX_HISTORY) {
                    historyStack.shift();
                }
                historyIndex = historyStack.length - 1;
            }

            function restoreState(index) {
                if (index < 0 || index >= historyStack.length) return;
                const img = new Image();
                img.onload = function() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
                img.src = historyStack[index];
                historyIndex = index;
            }

            function undo() {
                if (historyIndex > 0) {
                    restoreState(historyIndex - 1);
                } else {
                    // 已经是最早的状态，轻微提示
                    canvas.style.transition = 'box-shadow 0.15s';
                    canvas.style.boxShadow = 'inset 0 0 0 2px #f5576c';
                    setTimeout(() => {
                        canvas.style.boxShadow = 'none';
                    }, 300);
                }
            }

            // ---------- 绘图方法 ----------
            function getCanvasCoords(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                    e.preventDefault();
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                return {
                    x: (clientX - rect.left) * scaleX,
                    y: (clientY - rect.top) * scaleY
                };
            }

            function startDrawing(e) {
                e.preventDefault();
                if (isPlaying) return;
                const { x, y } = getCanvasCoords(e);
                isDrawing = true;
                lastX = x;
                lastY = y;

                // 录制：开始新笔画
                if (isRecording) {
                    currentStroke = {
                        points: [{ x, y, time: Date.now() }],
                        color: isEraser ? '#ffffff' : colorPicker.value,
                        size: parseInt(brushSize.value) || 1,
                        isEraser: isEraser
                    };
                }

                // 画一个点（点击时也留下痕迹）
                ctx.beginPath();
                ctx.arc(lastX, lastY, (parseInt(brushSize.value) || 1) / 2, 0, Math.PI * 2);
                if (isEraser) {
                    ctx.fillStyle = '#ffffff';
                } else {
                    ctx.fillStyle = colorPicker.value;
                }
                ctx.fill();
            }

            function draw(e) {
                e.preventDefault();
                if (isPlaying) return;
                if (!isDrawing) return;

                const { x, y } = getCanvasCoords(e);
                const size = parseInt(brushSize.value) || 1;

                // 录制：记录路径点
                if (isRecording && currentStroke) {
                    currentStroke.points.push({ x, y, time: Date.now() });
                }

                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(x, y);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineWidth = size;

                if (isEraser) {
                    ctx.strokeStyle = '#ffffff';
                } else {
                    ctx.strokeStyle = colorPicker.value;
                }

                ctx.stroke();

                lastX = x;
                lastY = y;
            }

            function stopDrawing(e) {
                if (isDrawing) {
                    isDrawing = false;
                    // 录制：结束当前笔画
                    if (isRecording && currentStroke) {
                        recordedStrokes.push(currentStroke);
                        currentStroke = null;
                    }
                    saveState();
                }
            }

            // ---------- 清空 ----------
            function clearCanvas() {
                // 停止录制
                if (isRecording) {
                    isRecording = false;
                    recordBtn.textContent = '⏺ 录制';
                    recordBtn.classList.remove('recording');
                }
                // 停止播放
                if (isPlaying) {
                    isPlaying = false;
                    playBtn.textContent = '▶ 播放';
                    playBtn.classList.remove('playing');
                }
                // 清空录制数据
                recordedStrokes.length = 0;
                currentStroke = null;
                // 清空画布
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                saveState();
            }

            // ---------- 撤销（录制时停止录制） ----------
            function undo() {
                if (isRecording) {
                    isRecording = false;
                    recordBtn.textContent = '⏺ 录制';
                    recordBtn.classList.remove('recording');
                }
                if (historyIndex > 0) {
                    restoreState(historyIndex - 1);
                } else {
                    // 已经是最早的状态，轻微提示
                    canvas.style.transition = 'box-shadow 0.15s';
                    canvas.style.boxShadow = 'inset 0 0 0 2px #f5576c';
                    setTimeout(() => {
                        canvas.style.boxShadow = 'none';
                    }, 300);
                }
            }

            // ---------- 下载 ----------
            function downloadCanvas() {
                // 如果正在播放，暂停播放
                if (isPlaying) {
                    isPlaying = false;
                    playBtn.textContent = '▶ 播放';
                    playBtn.classList.remove('playing');
                }
                const link = document.createElement('a');
                link.download = '我的画作.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }

            // ========== 录制 / 回放 ==========

            // ---------- 开始/停止录制 ----------
            function toggleRecording() {
                if (isPlaying) return; // 播放时禁用
                if (isRecording) {
                    // 停止录制
                    isRecording = false;
                    recordBtn.textContent = '⏺ 录制';
                    recordBtn.classList.remove('recording');
                } else {
                    // 开始录制 - 清空之前数据
                    recordedStrokes.length = 0;
                    currentStroke = null;
                    isRecording = true;
                    recordBtn.textContent = '⏹ 停止';
                    recordBtn.classList.add('recording');
                    // 如果画布有内容，以当前画布为起始状态（录制时不处理背景）
                }
            }

            // ---------- 回放动画 ----------
            function startPlayback() {
                if (recordedStrokes.length === 0) return;
                // 如果正在录制，先停止录制
                if (isRecording) {
                    isRecording = false;
                    recordBtn.textContent = '⏺ 录制';
                    recordBtn.classList.remove('recording');
                }
                if (isPlaying) {
                    // 暂停
                    isPlaying = false;
                    playBtn.textContent = '▶ 播放';
                    playBtn.classList.remove('playing');
                    return;
                }
                isPlaying = true;
                playBtn.textContent = '⏸ 暂停';
                playBtn.classList.add('playing');

                // 清空画布为白色
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const firstPointTime = recordedStrokes[0].points[0].time;
                const lastStroke = recordedStrokes[recordedStrokes.length - 1];
                const lastPointTime = lastStroke.points[lastStroke.points.length - 1].time;
                const totalDuration = lastPointTime - firstPointTime;

                playbackStartTime = performance.now();

                function playbackFrame(now) {
                    if (!isPlaying) return;
                    const elapsed = (now - playbackStartTime) * playbackSpeed;
                    const targetTime = firstPointTime + elapsed;

                    // 清空画布为白色
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // 遍历所有 strokes，画出所有时间 <= targetTime 的点
                    for (const stroke of recordedStrokes) {
                        const pts = stroke.points;
                        // 找到这个 stroke 中应该画到的点索引
                        let drawToIndex = -1;
                        for (let i = 0; i < pts.length; i++) {
                            if (pts[i].time <= targetTime) {
                                drawToIndex = i;
                            } else {
                                break;
                            }
                        }
                        if (drawToIndex >= 0) {
                            // 从第一个点画到 drawToIndex
                            ctx.beginPath();
                            ctx.moveTo(pts[0].x, pts[0].y);
                            for (let i = 1; i <= drawToIndex; i++) {
                                ctx.lineTo(pts[i].x, pts[i].y);
                            }
                            ctx.strokeStyle = stroke.isEraser ? '#ffffff' : stroke.color;
                            ctx.lineWidth = stroke.size;
                            ctx.lineCap = 'round';
                            ctx.lineJoin = 'round';
                            ctx.stroke();
                        }
                    }

                    if (elapsed < totalDuration) {
                        requestAnimationFrame(playbackFrame);
                    } else {
                        // 播放结束
                        isPlaying = false;
                        playBtn.textContent = '▶ 播放';
                        playBtn.classList.remove('playing');
                    }
                }
                requestAnimationFrame(playbackFrame);
            }

            // ---------- 速度切换 ----------
            function setSpeed(speed) {
                playbackSpeed = speed;
                // 更新高亮
                [speed05x, speed1x, speed2x].forEach(btn => btn.classList.remove('active'));
                if (speed === 0.5) speed05x.classList.add('active');
                else if (speed === 1) speed1x.classList.add('active');
                else if (speed === 2) speed2x.classList.add('active');
            }

            // ---------- 事件绑定 ----------
            // 鼠标事件
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseleave', stopDrawing);

            // 触摸事件（移动端支持）
            canvas.addEventListener('touchstart', startDrawing, { passive: false });
            canvas.addEventListener('touchmove', draw, { passive: false });
            canvas.addEventListener('touchend', stopDrawing, { passive: false });

            // 鼠标移出画布时显示坐标
            canvas.addEventListener('mousemove', function(e) {
                const { x, y } = getCanvasCoords(e);
                coordDisplay.textContent = `🖱 ${Math.round(x)}, ${Math.round(y)}`;
            });
            canvas.addEventListener('mouseleave', function() {
                coordDisplay.textContent = '🖱 0, 0';
            });

            // 颜色选择
            colorPicker.addEventListener('input', function() {
                colorPreview.style.borderColor = this.value;
                // 如果橡皮擦模式开着，切回画笔
                if (isEraser) {
                    isEraser = false;
                    eraserBtn.classList.remove('active');
                }
            });
            // 初始颜色预览边框
            colorPreview.style.borderColor = colorPicker.value;

            // 粗细滑块
            brushSize.addEventListener('input', function() {
                sizeDisplay.textContent = this.value;
            });

            // 清空
            clearBtn.addEventListener('click', clearCanvas);

            // 撤销
            undoBtn.addEventListener('click', undo);

            // 橡皮擦
            eraserBtn.addEventListener('click', function() {
                isEraser = !isEraser;
                this.classList.toggle('active');
                if (isEraser) {
                    canvas.style.cursor = 'cell';
                } else {
                    canvas.style.cursor = 'crosshair';
                }
            });

            // 下载
            downloadBtn.addEventListener('click', downloadCanvas);

            // 录制
            recordBtn.addEventListener('click', toggleRecording);

            // 播放
            playBtn.addEventListener('click', startPlayback);

            // 速度切换
            speed05x.addEventListener('click', function() { setSpeed(0.5); });
            speed1x.addEventListener('click', function() { setSpeed(1); });
            speed2x.addEventListener('click', function() { setSpeed(2); });

            // 键盘快捷键
            document.addEventListener('keydown', function(e) {
                // Ctrl+Z 撤销
                if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
                    e.preventDefault();
                    undo();
                }
                // E 切换橡皮擦
                if (e.key === 'e' || e.key === 'E') {
                    eraserBtn.click();
                }
                // R 切换录制
                if (e.key === 'r' || e.key === 'R') {
                    recordBtn.click();
                }
                // Space 切换播放
                if (e.key === ' ' && e.target === document.body) {
                    e.preventDefault();
                    playBtn.click();
                }
            });

            // ---------- 启动 ----------
            initCanvas();

            // 窗口 resize 保持比例 (canvas 像素不变，只影响显示)
            function resizeCanvasDisplay() {
                // 让 canvas 的 CSS 自适应宽度，保持比例
                // 高度由 width / aspect 决定
                const wrap = canvas.parentElement;
                const wrapWidth = wrap.clientWidth;
                const aspect = canvas.width / canvas.height;
                const displayHeight = wrapWidth / aspect;
                canvas.style.width = wrapWidth + 'px';
                canvas.style.height = displayHeight + 'px';
            }

            // 使用 ResizeObserver 更精准
            if (window.ResizeObserver) {
                const ro = new ResizeObserver(() => resizeCanvasDisplay());
                ro.observe(canvas.parentElement);
            }
            // 初始调整
            setTimeout(resizeCanvasDisplay, 50);
            window.addEventListener('resize', resizeCanvasDisplay);

            console.log('🎨 Canvas 画笔工具已加载！');
        })();
    </script>
</body>
</html>
