<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>下一百层 - Doodle Jump</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            display:flex; justify-content:center; align-items:center;
            height:100vh; background:#0f0c29;
            font-family:'Arial','Microsoft YaHei',sans-serif;
            overflow:hidden; user-select:none;
        }
        .game-wrapper {
            position:relative; display:flex; flex-direction:column;
            align-items:center; gap:8px;
        }
        .game-header {
            display:flex; justify-content:space-between; align-items:center;
            width:420px; padding:8px 18px;
            background:rgba(255,255,255,0.07);
            backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
            border-radius:14px;
            border:1px solid rgba(255,255,255,0.08);
        }
        .game-title {
            font-size:20px; font-weight:900;
            background:linear-gradient(135deg,#f093fb,#f5576c,#4facfe);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            letter-spacing:1px;
        }
        .game-stats { display:flex; gap:16px; align-items:center; }
        .stat-item {
            color:#fff; font-size:14px; font-weight:600;
            background:rgba(255,255,255,0.06);
            padding:4px 12px; border-radius:8px;
            border:1px solid rgba(255,255,255,0.05);
        }
        .stat-item span { color:#ffd700; font-size:17px; font-weight:700; }
        canvas {
            display:block; border-radius:14px;
            box-shadow:0 0 30px rgba(79,172,254,0.25),
                       0 0 60px rgba(245,87,108,0.12);
            background:#1a1a2e; cursor:pointer;
            touch-action:none;
        }
        .game-hint {
            color:rgba(255,255,255,0.3); font-size:12px;
            letter-spacing:0.5px; margin-top:2px;
        }
        .game-hint kbd {
            background:rgba(255,255,255,0.08);
            padding:1px 7px; border-radius:4px;
            border:1px solid rgba(255,255,255,0.08);
            font-size:11px; color:rgba(255,255,255,0.5);
        }
        @media(max-width:480px){
            .game-header{width:94vw;padding:5px 10px;}
            .game-title{font-size:15px;}
            .stat-item{font-size:11px;padding:2px 8px;}
            .game-hint{font-size:10px;}
            canvas{width:94vw;height:auto;aspect-ratio:420/680;}
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-header">
        <div class="game-title">⬇ 下一百层</div>
        <div class="game-stats">
            <div class="stat-item">🏗 <span id="floorDisplay">0</span></div>
            <div class="stat-item">⭐ <span id="scoreDisplay">0</span></div>
        </div>
    </div>
    <canvas id="gameCanvas" width="420" height="680"></canvas>
    <div class="game-hint">
        <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>A</kbd> <kbd>D</kbd> 移动 · <kbd>R</kbd> 重开
    </div>
</div>
<script>
(function(){
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const floorSpan = document.getElementById('floorDisplay');
    const scoreSpan = document.getElementById('scoreDisplay');

    const W = 420, H = 680;

    // 参数
    const PW = 66;             // 平台宽
    const PH = 13;             // 平台高
    const PL_W = 26;           // 角色宽
    const PL_H = 30;           // 角色高
    const GRAV = 0.28;
    const FALL_MIN = 1.8;
    const FALL_MAX = 9;
    const MOVE_SPD = 4.2;
    const GAP_MIN = 44;
    const GAP_MAX = 72;
    const EDGE = 15;

    // 状态
    let p;           // player
    let plats;       // platforms
    let score, floorCount, gameOver;
    let keys;
    let camY = 0;
    let bottomY = 0;    // 当前最下面的平台Y
    let particles = [];
    let floatText = '';
    let floatTimer = 0;
    let frameId = null;

    const T = { NORMAL:'normal', MOVING:'moving', FRAGILE:'fragile', BOUNCE:'bounce' };

    // ---- 初始化 ----
    function initGame(){
        p = {
            x: W/2-PL_W/2, y:60, w:PL_W, h:PL_H,
            vy:0, vx:0, onGround:false, dir:1
        };
        plats = [];
        score = 0;
        floorCount = 0;
        gameOver = false;
        keys = {left:false, right:false};
        camY = 0;
        bottomY = 0;
        particles = [];
        floatText = '';
        floatTimer = 0;

        // 生成初始平台群: 从 y=100 开始向下一片
        let y = 100;
        for(let i=0; i<22; i++){
            const gap = rand(GAP_MIN, GAP_MAX);
            y += gap;
            const type = (i===0) ? T.NORMAL : rType(y);
            const x = rand(EDGE, W-PW-EDGE);
            plats.push(makePlat(x, y, type, i===0));
        }
        bottomY = plats[plats.length-1].y;
        updateUI();
    }

    function makePlat(x,y,type,scored){
        let mr=0, ms=0, sx=x;
        if(type===T.MOVING){
            mr=rand(35,90); ms=(rand(0.8,2.3))*(Math.random()>0.5?1:-1);
        }
        return {
            x,y, w:PW, h:PH, type,
            startX:sx, movingRange:mr, movingSpeed:ms,
            hp:(type===T.FRAGILE)?1:999,
            scored:!!scored, breakAnim:0
        };
    }

    function rType(y){
        const d = floorCount;
        const r = Math.random();
        if(d>15 && r<0.10) return T.BOUNCE;
        if(d>8 && r<0.22) return T.FRAGILE;
        if(d>4 && r<0.35) return T.MOVING;
        return T.NORMAL;
    }

    function rand(a,b){ return Math.random()*(b-a)+a; }

    // ---- 底部生成新平台 ----
    function genBottom(){
        const viewBot = camY + H + 100;
        while(bottomY < viewBot){
            const gap = rand(GAP_MIN, GAP_MAX);
            const y = bottomY + gap;
            const type = rType(y);
            const x = rand(EDGE, W-PW-EDGE);
            plats.push(makePlat(x,y,type,false));
            bottomY = y;
        }
    }

    // ---- 清理屏幕外太远的平台（只清理远超出视口顶部的平台） ----
    function cleanFarPlatforms(){
        // 只清理远在视口上方 600px 以上的平台（约一屏高度），保留所有视口内和附近的平台
        const viewTop = camY - 600;
        const lenBefore = plats.length;
        plats = plats.filter(p2 => p2.y > viewTop);
        const lenAfter = plats.length;
        // 确保至少保留一些平台
        if(plats.length > 0){
            bottomY = Math.max(...plats.map(p2=>p2.y));
        }
    }

    // ---- 粒子 ----
    function spawnParticles(x,y,color,count,spread){
        for(let i=0;i<count;i++){
            particles.push({
                x,y,
                vx:rand(-spread,spread),
                vy:rand(-spread*0.8,spread*0.8),
                life:rand(15,45), maxLife:45,
                size:rand(2,5), color, decay:0.97
            });
        }
    }

    function updateParticles(){
        for(let i=particles.length-1;i>=0;i--){
            const pt=particles[i];
            pt.x+=pt.vx; pt.y+=pt.vy;
            pt.vy+=0.1;
            pt.life--; pt.size*=0.97;
            if(pt.life<=0||pt.size<0.3) particles.splice(i,1);
        }
    }

    // ---- 更新 ----
    function update(){
        if(gameOver) return;

        // 移动
        let dx=0;
        if(keys.left) dx-=MOVE_SPD;
        if(keys.right) dx+=MOVE_SPD;
        p.vx=dx;
        p.x+=p.vx;
        if(p.x<0) p.x=0;
        if(p.x+p.w>W) p.x=W-p.w;
        if(p.vx!==0) p.dir=p.vx>0?1:-1;

        // 重力
        p.vy+=GRAV;
        p.vy+=0.012*floorCount;
        if(p.vy>FALL_MAX) p.vy=FALL_MAX;
        if(p.vy<FALL_MIN) p.vy=FALL_MIN;
        p.y+=p.vy;

        // 平台碰撞
        p.onGround=false;
        for(let i=0;i<plats.length;i++){
            const pt=plats[i];
            // 跳过正在播放碎裂动画的平台
            if(pt.breakAnim>0) continue;
            // 只在玩家下落时检测
            if(p.vy<=0) continue;
            const pb=p.y+p.h;
            if(pb>=pt.y && pb<=pt.y+p.vy+4 &&
               p.x+p.w>pt.x+4 && p.x<pt.x+pt.w-4){
                // ===== 易碎平台处理 =====
                if(pt.type===T.FRAGILE){
                    pt.hp--;
                    if(pt.hp<=0){
                        // 易碎平台碎裂消失
                        spawnParticles(pt.x+pt.w/2,pt.y,'#ff6b6b',12,4);
                        spawnParticles(pt.x+pt.w/2,pt.y,'#ffd93d',6,3);
                        pt.breakAnim=1;
                        continue; // 不站在碎裂的平台上
                    }
                }
                // ===== 弹跳平台 =====
                if(pt.type===T.BOUNCE){
                    p.vy=-7;
                    spawnParticles(pt.x+pt.w/2,pt.y,'#a18cd1',10,4);
                }else{
                    // 普通平台、移动平台、未碎裂的易碎平台：玩家站在上面
                    p.vy=0;
                    p.y=pt.y-p.h;
                }
                p.onGround=true;
                // 首次踏上平台计分
                if(!pt.scored){
                    pt.scored=true;
                    floorCount++;
                    let pts=1;
                    if(pt.type===T.MOVING) pts=2;
                    else if(pt.type===T.FRAGILE) pts=3;
                    else if(pt.type===T.BOUNCE) pts=4;
                    score+=pts;
                    floatText='+'+pts;
                    floatTimer=25;
                    spawnParticles(pt.x+pt.w/2,pt.y,'#ffd700',6,3);
                    updateUI();
                }
                break;
            }
        }

        // 更新移动平台 & 碎裂动画
        for(const pt of plats){
            if(pt.type===T.MOVING && pt.breakAnim===0){
                pt.x+=pt.movingSpeed;
                if(pt.x>pt.startX+pt.movingRange || pt.x<pt.startX-pt.movingRange){
                    pt.movingSpeed*=-1;
                }
            }
            if(pt.breakAnim>0) {
                pt.breakAnim++;
                // 碎裂动画持续60帧后，从数组中移除
                if(pt.breakAnim >= 60) {
                    // 标记为已移除，后面统一过滤
                }
            }
        }

        // 移除碎裂动画播放完毕的平台
        plats = plats.filter(pt => pt.breakAnim === 0 || pt.breakAnim < 60);

        // 摄像机跟随（平滑跟随玩家下移）
        const target = p.y - H*0.3;
        if(target>camY){
            camY+=(target-camY)*0.12;
            if(camY<0) camY=0;
        }

        // 生成新平台 & 清理远处平台
        genBottom();
        cleanFarPlatforms();

        // 游戏结束判定
        if(p.y>camY+H+60){
            gameOver=true;
            spawnParticles(p.x+p.w/2,p.y,'#f5576c',25,6);
        }

        updateParticles();
        if(floatTimer>0) floatTimer--;
    }

    // ---- 绘制 ----
    function draw(){
        ctx.clearRect(0,0,W,H);

        // 背景渐变
        const g=ctx.createLinearGradient(0,0,0,H);
        g.addColorStop(0,'#0f0c29');
        g.addColorStop(0.35,'#302b63');
        g.addColorStop(0.7,'#24243e');
        g.addColorStop(1,'#1a1a2e');
        ctx.fillStyle=g;
        ctx.fillRect(0,0,W,H);

        // 星星
        drawStars();

        ctx.save();
        ctx.translate(0,-camY);

        // 平台
        for(const pt of plats){
            if(pt.breakAnim>0&&pt.breakAnim<60){
                // 碎裂动画
                const a=1-pt.breakAnim/60;
                ctx.globalAlpha=a;
                ctx.fillStyle='#ff6b6b';
                ctx.fillRect(pt.x,pt.y,pt.w,pt.h/2);
                ctx.fillStyle='#ffd93d';
                ctx.fillRect(pt.x+pt.w/4,pt.y+pt.h/4,pt.w/2,pt.h/2);
                ctx.globalAlpha=1;
                continue;
            }
            if(pt.breakAnim>=60) continue;
            drawPlat(pt);
        }

        // 玩家
        if(!gameOver || p.y<camY+H+70) drawPlayer();

        // 粒子
        for(const pt of particles){
            ctx.globalAlpha=pt.life/pt.maxLife;
            ctx.fillStyle=pt.color;
            ctx.beginPath();
            ctx.arc(pt.x,pt.y,pt.size,0,Math.PI*2);
            ctx.fill();
        }
        ctx.globalAlpha=1;
        ctx.restore();

        // 浮动文字
        if(floatTimer>0){
            ctx.save();
            ctx.fillStyle='#ffd700';
            ctx.font='bold 24px Arial';
            ctx.textAlign='center';
            ctx.textBaseline='middle';
            ctx.shadowColor='rgba(255,215,0,0.4)';
            ctx.shadowBlur=15;
            const fy=80-(25-floatTimer)*0.5;
            ctx.globalAlpha=floatTimer/25;
            ctx.fillText(floatText,W/2,fy);
            ctx.restore();
        }

        if(gameOver) drawGameOver();
    }

    function drawStars(){
        for(let i=0;i<55;i++){
            const sx=(i*137.5+42)%W;
            const sy=(i*97.3+33+camY*0.015)%(H+200)-100;
            const sz=0.5+(i%3)*0.5;
            const a=0.25+(i%5)*0.1;
            ctx.fillStyle=`rgba(255,255,255,${a})`;
            ctx.fillRect(sx,sy,sz,sz);
        }
    }

    function drawPlat(pt){
        const {x,y,w,h}=pt;
        ctx.save();
        const r=5;
        if(pt.type===T.NORMAL){
            const g=ctx.createLinearGradient(x,y,x,y+h);
            g.addColorStop(0,'#4facfe'); g.addColorStop(1,'#00f2fe');
            ctx.fillStyle=g;
            ctx.shadowColor='rgba(79,172,254,0.35)'; ctx.shadowBlur=10;
            roundRect(x,y,w,h,r); ctx.fill();
            ctx.shadowBlur=0;
            ctx.fillStyle='rgba(255,255,255,0.2)';
            roundRect(x+5,y+2,w-10,3,2); ctx.fill();
        }else if(pt.type===T.MOVING){
            const g=ctx.createLinearGradient(x,y,x,y+h);
            g.addColorStop(0,'#f093fb'); g.addColorStop(1,'#f5576c');
            ctx.fillStyle=g;
            ctx.shadowColor='rgba(245,87,108,0.35)'; ctx.shadowBlur=10;
            roundRect(x,y,w,h,r); ctx.fill();
            ctx.shadowBlur=0;
            ctx.fillStyle='rgba(255,255,255,0.5)';
            ctx.font='9px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(pt.movingSpeed>0?'→':'←',x+w/2,y+h/2+1);
        }else if(pt.type===T.FRAGILE){
            const g=ctx.createLinearGradient(x,y,x,y+h);
            g.addColorStop(0,'#ffd93d'); g.addColorStop(1,'#ff6b6b');
            ctx.fillStyle=g;
            ctx.shadowColor='rgba(255,107,107,0.3)'; ctx.shadowBlur=8;
            roundRect(x,y,w,h,r); ctx.fill();
            ctx.shadowBlur=0;
            ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1;
            ctx.beginPath();
            ctx.moveTo(x+8,y+3); ctx.lineTo(x+w/2,y+h-3); ctx.lineTo(x+w-8,y+4);
            ctx.stroke();
        }else if(pt.type===T.BOUNCE){
            const g=ctx.createLinearGradient(x,y,x,y+h);
            g.addColorStop(0,'#a18cd1'); g.addColorStop(1,'#fbc2eb');
            ctx.fillStyle=g;
            ctx.shadowColor='rgba(161,140,209,0.4)'; ctx.shadowBlur=14;
            roundRect(x,y,w,h,r); ctx.fill();
            ctx.shadowBlur=0;
            ctx.fillStyle='rgba(255,255,255,0.55)';
            ctx.font='bold 12px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText('⬆',x+w/2,y+h/2+1);
        }
        ctx.restore();
    }

    function roundRect(x,y,w,h,r){
        ctx.beginPath();
        ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
        ctx.quadraticCurveTo(x+w,y,x+w,y+r);
        ctx.lineTo(x+w,y+h-r);
        ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
        ctx.lineTo(x+r,y+h);
        ctx.quadraticCurveTo(x,y+h,x,y+h-r);
        ctx.lineTo(x,y+r);
        ctx.quadraticCurveTo(x,y,x+r,y);
        ctx.closePath();
    }

    function drawPlayer(){
        const x=p.x, y=p.y, d=p.dir;
        ctx.save();
        const cx=x+p.w/2, cy=y+p.h/2;

        // 光晕
        ctx.shadowColor='rgba(255,215,0,0.2)'; ctx.shadowBlur=16;

        // 身体
        const bg=ctx.createRadialGradient(cx-4,y+6,2,cx,cy,p.w/2+2);
        bg.addColorStop(0,'#fff3b0'); bg.addColorStop(0.4,'#ffa751'); bg.addColorStop(1,'#f7971e');
        ctx.fillStyle=bg;
        ctx.beginPath();
        ctx.ellipse(cx,cy,p.w/2-1,p.h/2-1,0,0,Math.PI*2);
        ctx.fill();

        // 眼睛
        ctx.shadowBlur=0;
        const eo=d*3;
        ctx.fillStyle='#2d3436';
        ctx.beginPath();
        ctx.arc(cx+eo-3,y+9,3,0,Math.PI*2); ctx.fill();
        ctx.beginPath();
        ctx.arc(cx+eo+3,y+9,3,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#fff';
        ctx.beginPath();
        ctx.arc(cx+eo-3+d,y+8,1.3,0,Math.PI*2); ctx.fill();
        ctx.beginPath();
        ctx.arc(cx+eo+3+d,y+8,1.3,0,Math.PI*2); ctx.fill();

        // 微笑
        ctx.strokeStyle='#2d3436'; ctx.lineWidth=1.5;
        ctx.beginPath();
        ctx.arc(cx+eo*0.5,y+16,4.5,0.15,Math.PI-0.15);
        ctx.stroke();

        // 帽子
        ctx.fillStyle='#e17055';
        ctx.shadowBlur=3; ctx.shadowColor='rgba(0,0,0,0.15)';
        ctx.beginPath();
        ctx.ellipse(cx,y+3,13,3.5,0,Math.PI,0); ctx.fill();
        ctx.fillRect(cx-5,y-1,10,4.5);

        // 下落特效
        ctx.shadowBlur=0;
        if(p.vy>4){
            ctx.strokeStyle='rgba(255,255,255,0.08)';
            ctx.lineWidth=1;
            for(let i=0;i<3;i++){
                const ly=y+p.h+3+i*4;
                ctx.beginPath();
                ctx.moveTo(cx-6+i*5,ly);
                ctx.lineTo(cx+6-i*5,ly+2);
                ctx.stroke();
            }
        }
        ctx.restore();
    }

    function drawGameOver(){
        ctx.save();
        ctx.fillStyle='rgba(0,0,0,0.55)';
        ctx.fillRect(0,0,W,H);

        ctx.textAlign='center'; ctx.textBaseline='middle';

        ctx.shadowColor='rgba(245,87,108,0.3)'; ctx.shadowBlur=30;
        ctx.fillStyle='#f5576c';
        ctx.font='bold 44px Arial';
        ctx.fillText('💀 坠落',W/2,H/2-80);

        ctx.shadowBlur=0;
        ctx.fillStyle='#fff'; ctx.font='22px Arial';
        ctx.fillText(`🏗 到达层数: ${floorCount}`,W/2,H/2-10);

        ctx.fillStyle='#ffd700'; ctx.font='bold 26px Arial';
        ctx.fillText(`⭐ 最终得分: ${score}`,W/2,H/2+40);

        ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='17px Arial';
        ctx.fillText('按 R 键重新开始',W/2,H/2+110);

        if(frameId&&Math.random()<0.3){
            const clr=['#f5576c','#ffd700','#4facfe','#a18cd1'][~~(Math.random()*4)];
            spawnParticles(rand(0,W),rand(0,H),clr,2,2);
        }
        ctx.restore();
    }

    // ---- UI ----
    function updateUI(){
        floorSpan.textContent=floorCount;
        scoreSpan.textContent=score;
    }

    // ---- 循环 ----
    function loop(){
        if(!gameOver) update();
        else updateParticles();
        draw();
        frameId=requestAnimationFrame(loop);
    }

    // ---- 键盘 ----
    document.addEventListener('keydown',e=>{
        const k=e.key;
        if(k==='ArrowLeft'||k==='Left'||k==='a'||k==='A'){keys.left=true;e.preventDefault();}
        else if(k==='ArrowRight'||k==='Right'||k==='d'||k==='D'){keys.right=true;e.preventDefault();}
        else if(k==='r'||k==='R'){if(gameOver){initGame();}e.preventDefault();}
    });
    document.addEventListener('keyup',e=>{
        const k=e.key;
        if(k==='ArrowLeft'||k==='Left'||k==='a'||k==='A'){keys.left=false;e.preventDefault();}
        else if(k==='ArrowRight'||k==='Right'||k==='d'||k==='D'){keys.right=false;e.preventDefault();}
    });

    // ---- 触摸 ----
    let tx=0;
    canvas.addEventListener('touchstart',e=>{e.preventDefault();tx=e.touches[0].clientX;});
    canvas.addEventListener('touchmove',e=>{
        e.preventDefault();
        const d=e.touches[0].clientX-tx;
        if(d>12){keys.right=true;keys.left=false;}
        else if(d<-12){keys.left=true;keys.right=false;}
        else{keys.left=false;keys.right=false;}
    });
    canvas.addEventListener('touchend',e=>{e.preventDefault();keys.left=false;keys.right=false;});

    // ---- 启动 ----
    initGame();
    loop();
})();
</script>
</body>
</html>
