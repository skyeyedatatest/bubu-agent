<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D太阳系</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; }
  canvas { display: block; }
  #info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.2); font: 13px/1.5 sans-serif;
    pointer-events: none; text-align: center; z-index: 10;
  }
  #loading {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    color: #ffaa44; font: 18px sans-serif; z-index: 20;
    background: #000;
  }
  #loading .spinner {
    width: 40px; height: 40px; margin-bottom: 16px;
    border: 3px solid rgba(255,170,68,0.2); border-top-color: #ffaa44;
    border-radius: 50%; animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading .sub { color: rgba(255,170,68,0.3); font-size: 13px; margin-top: 8px; }
  #labels {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.15); font: 12px/1.4 sans-serif;
    text-align: center; pointer-events: none; z-index: 10;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><div>太阳系生成中...</div></div>
<div id="labels">🪐 拖拽旋转 · 滚轮缩放</div>
<div id="info">🖱 双击切换自动旋转</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
document.getElementById('loading').style.display = 'none';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000005);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 20, 35);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 5;
controls.maxDistance = 80;
controls.target.set(0, 0, 0);
controls.autoRotate = true;
controls.autoRotateSpeed = 0.15;

// ===== 星空背景 =====
const starCount = 10000;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
const starSizes = new Float32Array(starCount);
const starBright = new Float32Array(starCount);

for (let i = 0; i < starCount; i++) {
  const r = 150 + Math.random() * 350;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  starPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
  starPos[i * 3 + 1] = r * Math.cos(phi);
  starPos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
  starSizes[i] = Math.random() * 2 + 0.5;
  starBright[i] = Math.random();
}

starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
starGeo.setAttribute('bright', new THREE.BufferAttribute(starBright, 1));

const starMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    attribute float size;
    attribute float bright;
    varying float vBright;
    uniform float uTime;
    void main() {
      float tw = 0.6 + 0.4 * sin(uTime * (0.3 + bright * 1.5) + bright * 50.0);
      vBright = bright * tw;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * (40.0 / -mv.z);
      gl_Position = projectionMatrix * mv;
    }
  `,
  fragmentShader: `
    varying float vBright;
    void main() {
      float d = distance(gl_PointCoord, vec2(0.5));
      if (d > 0.5) discard;
      float a = 1.0 - smoothstep(0.0, 0.5, d);
      float c = vBright * 0.6 + 0.4;
      gl_FragColor = vec4(c, c, c * 1.2, a);
    }
  `,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// ===== 全局光照 =====
const ambient = new THREE.AmbientLight(0x111133, 0.2);
scene.add(ambient);

// ===== 太阳（高精度纹理表面）=====
// 程序化生成太阳表面纹理
function createSunTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 1024;
  canvas.height = 512;
  const ctx = canvas.getContext('2d');

  // 1. 基础渐变 - 赤道亮，两极暗
  const grad = ctx.createLinearGradient(0, 0, 0, 512);
  grad.addColorStop(0, '#cc5500');
  grad.addColorStop(0.15, '#dd6600');
  grad.addColorStop(0.3, '#ee7700');
  grad.addColorStop(0.5, '#ffaa33');
  grad.addColorStop(0.7, '#ee7700');
  grad.addColorStop(0.85, '#dd6600');
  grad.addColorStop(1, '#cc5500');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 1024, 512);

  // 2. 米粒组织（granulation）- 细小颗粒
  for (let i = 0; i < 12000; i++) {
    const x = Math.random() * 1024;
    const y = Math.random() * 512;
    const r = Math.random() * 8 + 2;
    const bright = Math.random() * 0.3 + 0.7;
    const alpha = Math.random() * 0.3 + 0.1;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, ${Math.floor(180 * bright)}, ${Math.floor(80 * bright)}, ${alpha})`;
    ctx.fill();
  }

  // 3. 暗纹/纤维结构
  for (let i = 0; i < 200; i++) {
    const x = Math.random() * 1024;
    const y = Math.random() * 512;
    const len = Math.random() * 60 + 20;
    const angle = Math.random() * Math.PI;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + Math.cos(angle) * len, y + Math.sin(angle) * len);
    ctx.strokeStyle = `rgba(180, 80, 20, ${Math.random() * 0.15})`;
    ctx.lineWidth = Math.random() * 3 + 1;
    ctx.stroke();
  }

  // 4. 太阳黑子
  const spotCount = 8 + Math.floor(Math.random() * 6);
  for (let i = 0; i < spotCount; i++) {
    const cx = Math.random() * 1024;
    const cy = Math.random() * 512;
    const rBig = Math.random() * 25 + 10;
    // 半影（外围）
    const grad2 = ctx.createRadialGradient(cx, cy, 0, cx, cy, rBig);
    grad2.addColorStop(0, 'rgba(60, 30, 10, 0.8)');
    grad2.addColorStop(0.3, 'rgba(80, 40, 15, 0.6)');
    grad2.addColorStop(0.7, 'rgba(120, 60, 25, 0.3)');
    grad2.addColorStop(1, 'rgba(200, 100, 40, 0)');
    ctx.fillStyle = grad2;
    ctx.beginPath();
    ctx.arc(cx, cy, rBig, 0, Math.PI * 2);
    ctx.fill();
    // 本影（中心）
    const rSmall = rBig * 0.3;
    const grad3 = ctx.createRadialGradient(cx, cy, 0, cx, cy, rSmall);
    grad3.addColorStop(0, 'rgba(20, 10, 5, 0.9)');
    grad3.addColorStop(1, 'rgba(50, 25, 10, 0)');
    ctx.fillStyle = grad3;
    ctx.beginPath();
    ctx.arc(cx, cy, rSmall, 0, Math.PI * 2);
    ctx.fill();
  }

  // 5. 亮斑（光斑）
  for (let i = 0; i < 40; i++) {
    const x = Math.random() * 1024;
    const y = Math.random() * 512;
    const r = Math.random() * 12 + 4;
    const grad4 = ctx.createRadialGradient(x, y, 0, x, y, r);
    grad4.addColorStop(0, 'rgba(255, 220, 150, 0.25)');
    grad4.addColorStop(1, 'rgba(255, 200, 100, 0)');
    ctx.fillStyle = grad4;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  const texture = new THREE.CanvasTexture(canvas);
  texture.wrapS = THREE.RepeatWrapping;
  texture.wrapT = THREE.ClampToEdgeWrapping;
  return texture;
}

const sunTexture = createSunTexture();

const sunGeo = new THREE.SphereGeometry(2.2, 64, 64);
const sunMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uTexture: { value: sunTexture },
  },
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vPos;
    uniform float uTime;
    void main() {
      vUv = uv;
      vNormal = normalize(normalMatrix * normal);
      vec3 pos = position;
      // 表面涌动
      float pulse = sin(pos.x * 3.0 + uTime * 1.5) * 0.025
                  + sin(pos.y * 4.0 + uTime * 1.2) * 0.025
                  + sin(pos.z * 3.5 + uTime * 1.8) * 0.025;
      pos += normal * pulse;
      vec4 worldPos = modelMatrix * vec4(pos, 1.0);
      vPos = worldPos.xyz;
      gl_Position = projectionMatrix * viewMatrix * worldPos;
    }
  `,
  fragmentShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vPos;
    uniform float uTime;
    uniform sampler2D uTexture;

    void main() {
      vec3 N = normalize(vNormal);
      vec3 V = normalize(cameraPosition - vPos);
      vec3 L = vec3(1.0, 1.0, 0.5);
      vec3 H = normalize(L + V);

      // 纹理采样 - UV随纬度拉伸
      vec2 uv = vUv;
      uv.x += uTime * 0.01; // 缓慢旋转
      vec3 texColor = texture2D(uTexture, uv).rgb;

      // 边缘变暗（临边昏暗）
      float rim = 1.0 - abs(dot(N, V));
      float limbDark = 0.5 + 0.5 * rim;
      texColor *= limbDark;

      // 光照
      float diff = max(dot(N, L), 0.0);
      float spec = pow(max(dot(N, H), 0.0), 40.0);

      vec3 col = texColor * (0.4 + diff * 0.6) + vec3(1.0, 0.8, 0.4) * spec * 0.6;
      // 边缘发光
      col += vec3(1.0, 0.3, 0.0) * pow(1.0 - rim, 3.0) * 0.4;

      // 色温 - 边缘偏红
      col = mix(col, col * vec3(1.0, 0.7, 0.5), pow(1.0 - rim, 2.0) * 0.3);

      gl_FragColor = vec4(col, 1.0);
    }
  `,
});
const sun = new THREE.Mesh(sunGeo, sunMat);
scene.add(sun);

// 太阳光晕 - 多层
function createGlow(radius, color, opacity, segments) {
  const g = new THREE.SpriteMaterial({
    map: createGlowTexture(color, opacity),
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    transparent: true,
  });
  const s = new THREE.Sprite(g);
  s.scale.set(radius, radius, 1);
  return s;
}

function createGlowTexture(color, opacity) {
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 256;
  const ctx = canvas.getContext('2d');
  const gradient = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
  gradient.addColorStop(0, `rgba(${color}, ${opacity})`);
  gradient.addColorStop(0.2, `rgba(${color}, ${opacity * 0.6})`);
  gradient.addColorStop(0.5, `rgba(${color}, ${opacity * 0.2})`);
  gradient.addColorStop(1, `rgba(${color}, 0)`);
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, 256, 256);
  const texture = new THREE.CanvasTexture(canvas);
  return texture;
}

const glow1 = createGlow(8, '255,180,80', 0.3);
const glow2 = createGlow(14, '255,120,40', 0.12);
const glow3 = createGlow(22, '255,80,20', 0.05);
scene.add(glow1);
scene.add(glow2);
scene.add(glow3);

// 太阳点光源
const sunLight = new THREE.PointLight(0xffaa66, 1.5, 60);
sunLight.position.set(0, 0, 0);
scene.add(sunLight);

const sunLight2 = new THREE.PointLight(0xff8833, 0.8, 40);
sunLight2.position.set(0, 0, 0);
scene.add(sunLight2);

// ===== 行星数据 =====
const planetData = [
  { name: '水星', radius: 0.25, distance: 3.2, color: 0xaaaaaa, speed: 4.15, tilt: 0.03, rotation: 0.02 },
  { name: '金星', radius: 0.4, distance: 4.8, color: 0xe8c87a, speed: 1.62, tilt: 2.64, rotation: 0.01 },
  { name: '地球', radius: 0.45, distance: 6.5, color: 0x4488cc, speed: 1.0, tilt: 0.41, rotation: 0.05 },
  { name: '火星', radius: 0.35, distance: 8.2, color: 0xcc6633, speed: 0.53, tilt: 0.44, rotation: 0.04 },
  { name: '木星', radius: 0.9, distance: 10.8, color: 0xd4a574, speed: 0.084, tilt: 0.05, rotation: 0.08 },
  { name: '土星', radius: 0.75, distance: 13.8, color: 0xe8d5a0, speed: 0.034, tilt: 0.47, rotation: 0.06 },
  { name: '天王星', radius: 0.6, distance: 17.0, color: 0x6fd4d4, speed: 0.012, tilt: 1.71, rotation: 0.04 },
  { name: '海王星', radius: 0.58, distance: 20.0, color: 0x3355cc, speed: 0.006, tilt: 0.49, rotation: 0.03 },
];

const planets = [];
const orbitLines = [];

planetData.forEach((data, index) => {
  // 轨道线
  const orbitPoints = [];
  const segments = 80;
  for (let i = 0; i <= segments; i++) {
    const angle = (i / segments) * Math.PI * 2;
    orbitPoints.push(Math.cos(angle) * data.distance, 0, Math.sin(angle) * data.distance);
  }
  const orbitGeo = new THREE.BufferGeometry();
  orbitGeo.setAttribute('position', new THREE.Float32BufferAttribute(orbitPoints, 3));
  const orbitMat = new THREE.LineBasicMaterial({
    color: 0x446688,
    transparent: true,
    opacity: 0.25,
  });
  const orbitLine = new THREE.Line(orbitGeo, orbitMat);
  scene.add(orbitLine);
  orbitLines.push(orbitLine);

  // 行星本体
  const geo = new THREE.SphereGeometry(data.radius, 32, 32);
  const mat = new THREE.MeshPhongMaterial({
    color: data.color,
    emissive: data.color,
    emissiveIntensity: 0.05,
    shininess: 30,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.userData = {
    angle: Math.random() * Math.PI * 2,
    distance: data.distance,
    speed: data.speed,
    tilt: data.tilt,
    rotationSpeed: data.rotation,
    name: data.name,
  };
  // 初始位置
  const initAngle = mesh.userData.angle;
  mesh.position.x = Math.cos(initAngle) * data.distance;
  mesh.position.z = Math.sin(initAngle) * data.distance;
  mesh.rotation.z = data.tilt;
  scene.add(mesh);
  planets.push(mesh);

  // 土星环
  if (data.name === '土星') {
    const ringGeo = new THREE.RingGeometry(data.radius * 1.1, data.radius * 2.0, 64);
    const ringMat = new THREE.MeshBasicMaterial({
      color: 0xc8b88a,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.5,
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2.5;
    ring.position.y = 0;
    mesh.add(ring);
    
    // 内环
    const ringGeo2 = new THREE.RingGeometry(data.radius * 0.8, data.radius * 1.05, 64);
    const ringMat2 = new THREE.MeshBasicMaterial({
      color: 0x887766,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.3,
    });
    const ring2 = new THREE.Mesh(ringGeo2, ringMat2);
    ring2.rotation.x = Math.PI / 2.5;
    mesh.add(ring2);
  }
});

// ===== 小行星带 =====
const ASTEROID_COUNT = 3000;
const astGeo = new THREE.BufferGeometry();
const astPos = new Float32Array(ASTEROID_COUNT * 3);
const astSizes = new Float32Array(ASTEROID_COUNT);

for (let i = 0; i < ASTEROID_COUNT; i++) {
  const angle = Math.random() * Math.PI * 2;
  const r = 9.5 + Math.random() * 1.8;
  const y = (Math.random() - 0.5) * 0.6;
  astPos[i * 3] = Math.cos(angle) * r;
  astPos[i * 3 + 1] = y;
  astPos[i * 3 + 2] = Math.sin(angle) * r;
  astSizes[i] = Math.random() * 0.12 + 0.03;
}

astGeo.setAttribute('position', new THREE.BufferAttribute(astPos, 3));
astGeo.setAttribute('size', new THREE.BufferAttribute(astSizes, 1));

const astMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    attribute float size;
    uniform float uTime;
    void main() {
      vec3 pos = position;
      float angle = uTime * 0.05;
      float c = cos(angle);
      float s = sin(angle);
      float x = pos.x * c - pos.z * s;
      float z = pos.x * s + pos.z * c;
      pos.x = x;
      pos.z = z;
      vec4 mv = modelViewMatrix * vec4(pos, 1.0);
      gl_PointSize = size * (80.0 / -mv.z);
      gl_Position = projectionMatrix * mv;
    }
  `,
  fragmentShader: `
    void main() {
      float d = distance(gl_PointCoord, vec2(0.5));
      if (d > 0.5) discard;
      float a = 1.0 - smoothstep(0.0, 0.5, d);
      gl_FragColor = vec4(0.6, 0.6, 0.6, a * 0.7);
    }
  `,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const asteroids = new THREE.Points(astGeo, astMat);
scene.add(asteroids);

// ===== 自适应 =====
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ===== 动画 =====
const clock = new THREE.Clock();

function animate() {
  const elapsed = clock.getElapsedTime();
  const dt = 0.016;

  // 太阳动画
  sun.material.uniforms.uTime.value = elapsed;
  sun.rotation.y = elapsed * 0.05;
  
  // 光晕脉动
  const pulse = 1 + Math.sin(elapsed * 0.5) * 0.03;
  glow1.scale.set(8 * pulse, 8 * pulse, 1);
  glow2.scale.set(14 * pulse, 14 * pulse, 1);
  glow3.scale.set(22 * pulse, 22 * pulse, 1);
  
  sunLight.intensity = 1.5 + Math.sin(elapsed * 0.5) * 0.2;

  // 行星公转
  planets.forEach(mesh => {
    const data = mesh.userData;
    data.angle += dt * data.speed * 0.5;
    mesh.position.x = Math.cos(data.angle) * data.distance;
    mesh.position.z = Math.sin(data.angle) * data.distance;
    mesh.rotation.y += data.rotationSpeed;
  });

  // 小行星带
  asteroids.material.uniforms.uTime.value = elapsed;

  // 星空
  stars.material.uniforms.uTime.value = elapsed;

  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

animate();

renderer.domElement.addEventListener('dblclick', () => {
  controls.autoRotate = !controls.autoRotate;
});
</script>
</body>
</html>
