<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 3D 银河星图 - 可拖拽</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        canvas:active {
            cursor: grabbing;
        }
        .info {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.35);
            font-size: 13px;
            letter-spacing: 2px;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(100,150,255,0.3);
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
        .hint {
            position: fixed;
            bottom: 55px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.2);
            font-size: 11px;
            letter-spacing: 1px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">🌌 拖 拽 旋 转 · 星 图 变 幻 🌌</div>
    <div class="hint">🖱 拖拽旋转 · 点击爆发 · 星图飞闪</div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // ============ 3D 相机控制 ============
        let rotX = 0.2;
        let rotY = 0;
        let targetRotX = 0.2;
        let targetRotY = 0;
        const FOV = 800;
        let isDragging = false;
        let lastMX = 0, lastMY = 0;
        let dragVX = 0, dragVY = 0;
        let autoRotate = true;
        let autoRotateSpeed = 0.002;

        function project(x, y, z) {
            const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
            const x1 = x * cosY - z * sinY;
            const z1 = x * sinY + z * cosY;
            const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
            const y1 = y * cosX - z1 * sinX;
            const z2 = y * sinX + z1 * cosX;
            const scale = FOV / (FOV + z2);
            return { sx: x1 * scale + W / 2, sy: y1 * scale + H / 2, scale: scale, z: z2 };
        }

        // ============ 鼠标拖拽 ============
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastMX = e.clientX;
            lastMY = e.clientY;
            autoRotate = false;
            dragVX = 0;
            dragVY = 0;
        });
        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const dx = e.clientX - lastMX;
                const dy = e.clientY - lastMY;
                targetRotY += dx * 0.005;
                targetRotX += dy * 0.005;
                targetRotX = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, targetRotX));
                dragVX = dx * 0.005;
                dragVY = dy * 0.005;
                lastMX = e.clientX;
                lastMY = e.clientY;
            }
        });
        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                setTimeout(() => { autoRotate = true; }, 3000);
            }
        });

        let touchId = null;
        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            if (touch) {
                touchId = touch.identifier;
                isDragging = true;
                lastMX = touch.clientX;
                lastMY = touch.clientY;
                autoRotate = false;
                dragVX = 0;
                dragVY = 0;
            }
            e.preventDefault();
        }, { passive: false });
        canvas.addEventListener('touchmove', (e) => {
            for (const touch of e.changedTouches) {
                if (touch.identifier === touchId) {
                    const dx = touch.clientX - lastMX;
                    const dy = touch.clientY - lastMY;
                    targetRotY += dx * 0.005;
                    targetRotX += dy * 0.005;
                    targetRotX = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, targetRotX));
                    dragVX = dx * 0.005;
                    dragVY = dy * 0.005;
                    lastMX = touch.clientX;
                    lastMY = touch.clientY;
                }
            }
            e.preventDefault();
        }, { passive: false });
        canvas.addEventListener('touchend', () => {
            isDragging = false;
            touchId = null;
            setTimeout(() => { autoRotate = true; }, 3000);
        });

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const cx = e.clientX - rect.left;
            const cy = e.clientY - rect.top;
            for (let i = 0; i < 50; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;
                const speed = 2 + Math.random() * 6;
                const dist = 50 + Math.random() * 200;
                const px = Math.sin(phi) * Math.cos(theta) * dist;
                const py = Math.sin(phi) * Math.sin(theta) * dist;
                const pz = Math.cos(phi) * dist + 200;
                const cosY = Math.cos(-rotY), sinY = Math.sin(-rotY);
                const rx = px * cosY - pz * sinY;
                const rz = px * sinY + pz * cosY;
                const cosX = Math.cos(-rotX), sinX = Math.sin(-rotX);
                const ry = py * cosX - rz * sinX;
                const rz2 = py * sinX + rz * cosX;
                mouseStars.push({
                    x: rx, y: ry, z: rz2,
                    vx: (Math.random() - 0.5) * speed,
                    vy: (Math.random() - 0.5) * speed,
                    vz: (Math.random() - 0.5) * speed,
                    life: 1.0,
                    size: 1 + Math.random() * 4,
                    hue: Math.random() * 360
                });
            }
        });

        // ============ 星空粒子系统 ============
        const MAX_STARS = 2500;
        const stars = [];
        const shootingStars = [];
        const nebulae = [];

        const starColors = [
            '#ffffff', '#ffeef8', '#e8f0ff', '#fff8e0',
            '#aaccff', '#ffddbb', '#cceeff', '#ffccdd'
        ];

        // ============ 动态星图系统（高速随机版）============
        class StarMap {
            constructor() {
                this.constellations = [];
                this.nextGenTime = 800 + Math.random() * 1200; // 0.8~2秒快速刷新
                this.timer = 0;
                this.maxConstellations = 6 + Math.floor(Math.random() * 5); // 6-10组
                this.generating = false;
                this.genProgress = 0;
                this.genSpeed = 0.015 + Math.random() * 0.02; // 快速出现
            }

            generate(stars) {
                this.constellations = [];
                // 收集可见星星
                const visible = [];
                for (const s of stars) {
                    const p = project(s.x, s.y, s.z);
                    if (p.z > -FOV && p.scale > 0.08) {
                        visible.push({ star: s, proj: p });
                    }
                }
                if (visible.length < 30) return;

                const count = this.maxConstellations;
                for (let ci = 0; ci < count; ci++) {
                    // 随机选种子 - 完全随机，不限于附近
                    const seedIdx = Math.floor(Math.random() * visible.length);
                    const seed = visible[seedIdx];
                    const group = [seed];
                    const usedIndices = new Set([seedIdx]);

                    // 随机从各个区域取星星，不限于附近
                    const groupSize = 4 + Math.floor(Math.random() * 8); // 4-11颗

                    // 随机选星策略：一部分从附近取，一部分从远处取
                    for (let attempt = 0; attempt < 60 && group.length < groupSize; attempt++) {
                        // 70%概率就近取，30%概率完全随机
                        let candidateIdx;
                        if (Math.random() < 0.7 && group.length > 1) {
                            // 从组内某颗星附近找
                            const ref = group[Math.floor(Math.random() * group.length)];
                            let bestIdx = -1;
                            let bestDist = Infinity;
                            for (let i = 0; i < visible.length; i++) {
                                if (usedIndices.has(i)) continue;
                                const dx = visible[i].proj.sx - ref.proj.sx;
                                const dy = visible[i].proj.sy - ref.proj.sy;
                                const dist = Math.sqrt(dx * dx + dy * dy);
                                // 范围放宽到 30~350 像素
                                if (dist > 30 && dist < 350 && dist < bestDist) {
                                    bestDist = dist;
                                    bestIdx = i;
                                }
                            }
                            candidateIdx = bestIdx;
                        } else {
                            // 完全随机取一颗未被使用的星
                            const unused = [];
                            for (let i = 0; i < visible.length; i++) {
                                if (!usedIndices.has(i)) unused.push(i);
                            }
                            if (unused.length > 0) {
                                candidateIdx = unused[Math.floor(Math.random() * unused.length)];
                            }
                        }

                        if (candidateIdx !== -1 && !usedIndices.has(candidateIdx)) {
                            usedIndices.add(candidateIdx);
                            group.push(visible[candidateIdx]);
                        }
                    }

                    if (group.length >= 3) {
                        // ---- 随机连线策略 ----
                        const lines = [];
                        // 方式1：最小生成树 (40%概率)
                        if (Math.random() < 0.4) {
                            const connected = new Set([0]);
                            while (connected.size < group.length) {
                                let bestFrom = -1, bestTo = -1;
                                let bestDist = Infinity;
                                for (const from of connected) {
                                    for (let to = 0; to < group.length; to++) {
                                        if (connected.has(to)) continue;
                                        const dx = group[from].proj.sx - group[to].proj.sx;
                                        const dy = group[from].proj.sy - group[to].proj.sy;
                                        const dist = Math.sqrt(dx * dx + dy * dy);
                                        if (dist < bestDist) {
                                            bestDist = dist;
                                            bestFrom = from;
                                            bestTo = to;
                                        }
                                    }
                                }
                                if (bestFrom !== -1) {
                                    connected.add(bestTo);
                                    lines.push({ from: bestFrom, to: bestTo });
                                } else break;
                            }
                        } else {
                            // 方式2：随机连线 (60%概率) - 更随机
                            const pairCount = group.length - 1 + Math.floor(Math.random() * (group.length - 1));
                            const usedPairs = new Set();
                            for (let p = 0; p < pairCount; p++) {
                                const from = Math.floor(Math.random() * group.length);
                                let to = Math.floor(Math.random() * group.length);
                                if (from === to) continue;
                                const key = Math.min(from, to) + '-' + Math.max(from, to);
                                if (usedPairs.has(key)) continue;
                                usedPairs.add(key);
                                lines.push({ from, to });
                            }
                        }

                        // 额外加一些短连线丰富图案 (随机加)
                        for (let i = 0; i < group.length; i++) {
                            for (let j = i + 1; j < group.length; j++) {
                                const dx = group[i].proj.sx - group[j].proj.sx;
                                const dy = group[i].proj.sy - group[j].proj.sy;
                                const dist = Math.sqrt(dx * dx + dy * dy);
                                if (dist < 120 && Math.random() < 0.4) {
                                    let exists = false;
                                    for (const l of lines) {
                                        if ((l.from === i && l.to === j) || (l.from === j && l.to === i)) {
                                            exists = true;
                                            break;
                                        }
                                    }
                                    if (!exists) lines.push({ from: i, to: j });
                                }
                            }
                        }

                        const hue = Math.random() * 360;
                        this.constellations.push({
                            group,
                            lines,
                            hue,
                            alpha: 0,
                            targetAlpha: 0.25 + Math.random() * 0.4,
                            pulse: Math.random() * Math.PI * 2,
                            pulseSpeed: 0.008 + Math.random() * 0.015,
                            life: 1.0 + Math.random() * 0.5
                        });
                    }
                }
                this.generating = true;
                this.genProgress = 0;
            }

            update(stars, time) {
                // 更新已有星座
                for (const c of this.constellations) {
                    if (this.generating) {
                        c.alpha = Math.min(c.targetAlpha, c.alpha + 0.025);
                    }
                    c.pulse += c.pulseSpeed;
                    // 星座自身也有寿命衰减，显得更动态
                    if (!this.generating) {
                        c.life -= 0.002;
                    }
                }

                if (this.generating) {
                    this.genProgress += this.genSpeed;
                    if (this.genProgress >= 1) {
                        this.generating = false;
                        this.timer = 0;
                        // 显示时间更短 1.5~4秒
                        this.nextGenTime = 1500 + Math.random() * 2500;
                    }
                    return;
                }

                this.timer++;

                // 快结束时快速淡出
                if (this.timer > this.nextGenTime - 600) {
                    const fadeProgress = (this.timer - (this.nextGenTime - 600)) / 600;
                    for (const c of this.constellations) {
                        c.alpha = Math.max(0, c.targetAlpha * (1 - fadeProgress));
                    }
                }

                if (this.timer > this.nextGenTime) {
                    this.generate(stars);
                }

                // 高频闪现小星座
                if (this.constellations.length > 0 && Math.random() < 0.005) {
                    this.flashConstellation(stars);
                }
            }

            flashConstellation(stars) {
                const visible = [];
                for (const s of stars) {
                    const p = project(s.x, s.y, s.z);
                    if (p.z > -FOV && p.scale > 0.08) {
                        visible.push({ star: s, proj: p });
                    }
                }
                if (visible.length < 15) return;

                // 随机选3-6颗星，完全随机位置
                const size = 3 + Math.floor(Math.random() * 4);
                const indices = new Set();
                while (indices.size < size && indices.size < visible.length) {
                    indices.add(Math.floor(Math.random() * visible.length));
                }
                const group = [];
                for (const idx of indices) group.push(visible[idx]);

                if (group.length >= 3) {
                    const lines = [];
                    // 随机连线
                    const pairCount = 2 + Math.floor(Math.random() * 4);
                    const usedPairs = new Set();
                    for (let p = 0; p < pairCount; p++) {
                        const from = Math.floor(Math.random() * group.length);
                        let to = Math.floor(Math.random() * group.length);
                        if (from === to) continue;
                        const key = Math.min(from, to) + '-' + Math.max(from, to);
                        if (usedPairs.has(key)) continue;
                        usedPairs.add(key);
                        lines.push({ from, to });
                    }
                    if (lines.length > 0) {
                        const flash = {
                            group,
                            lines,
                            hue: Math.random() * 360,
                            alpha: 0,
                            targetAlpha: 0.5 + Math.random() * 0.4,
                            pulse: 0,
                            pulseSpeed: 0.03 + Math.random() * 0.04,
                            flash: true,
                            life: 1.0
                        };
                        this.constellations.push(flash);
                    }
                }
            }

            draw(ctx, time) {
                for (const c of this.constellations) {
                    const alpha = c.alpha * (0.6 + 0.4 * Math.sin(c.pulse));
                    if (alpha < 0.005) continue;

                    const hue = c.hue;

                    if (c.flash) {
                        c.life -= 0.012;
                        if (c.life <= 0) {
                            c.alpha = 0;
                            continue;
                        }
                    }

                    // 画连线
                    ctx.save();
                    for (const line of c.lines) {
                        if (line.from >= c.group.length || line.to >= c.group.length) continue;
                        const p1 = c.group[line.from].proj;
                        const p2 = c.group[line.to].proj;
                        const dist = Math.sqrt((p1.sx - p2.sx) ** 2 + (p1.sy - p2.sy) ** 2);
                        const lineAlpha = alpha * Math.min(1, 250 / (dist + 10));

                        // 发光连线
                        ctx.shadowColor = `hsla(${hue}, 80%, 70%, ${lineAlpha * 0.5})`;
                        ctx.shadowBlur = 10;
                        ctx.strokeStyle = `hsla(${hue}, 70%, 65%, ${lineAlpha * 0.6})`;
                        ctx.lineWidth = 0.8 + 0.5 * Math.sin(c.pulse);
                        ctx.beginPath();
                        ctx.moveTo(p1.sx, p1.sy);
                        ctx.lineTo(p2.sx, p2.sy);
                        ctx.stroke();

                        // 内层亮线
                        ctx.shadowBlur = 0;
                        ctx.strokeStyle = `hsla(${hue}, 80%, 85%, ${lineAlpha * 0.2})`;
                        ctx.lineWidth = 0.3;
                        ctx.stroke();
                    }

                    // 画星点
                    for (const g of c.group) {
                        const p = g.proj;
                        const starAlpha = alpha * (0.7 + 0.3 * Math.sin(c.pulse + g.star.twinklePhase));
                        const size = (1.5 + 0.6 * Math.sin(c.pulse)) * p.scale;

                        const grad = ctx.createRadialGradient(p.sx, p.sy, 0, p.sx, p.sy, size * 4);
                        grad.addColorStop(0, `hsla(${hue}, 80%, 80%, ${starAlpha * 0.4})`);
                        grad.addColorStop(1, `hsla(${hue}, 80%, 80%, 0)`);
                        ctx.beginPath();
                        ctx.arc(p.sx, p.sy, size * 4, 0, Math.PI * 2);
                        ctx.fillStyle = grad;
                        ctx.fill();

                        ctx.shadowColor = `hsla(${hue}, 80%, 80%, ${starAlpha})`;
                        ctx.shadowBlur = 12;
                        ctx.beginPath();
                        ctx.arc(p.sx, p.sy, size * 0.8, 0, Math.PI * 2);
                        ctx.fillStyle = `hsla(${hue}, 80%, 90%, ${starAlpha})`;
                        ctx.fill();
                    }
                    ctx.restore();
                }

                this.constellations = this.constellations.filter(c => {
                    if (c.flash && c.life <= 0) return false;
                    return c.alpha > 0.005;
                });
            }
        }

        // ============ 银河（3D版）============
        class MilkyWay3D {
            constructor() {
                this.particles = [];
                this.dusts = [];

                const starCount = 1200;
                for (let i = 0; i < starCount; i++) {
                    const rFactor = Math.pow(Math.random(), 0.5);
                    const r = 100 + rFactor * 500;
                    const a = Math.random() * Math.PI * 2;
                    const thickness = (1 - r / 600) * 30 + 5;
                    this.particles.push({
                        x: Math.cos(a) * r,
                        y: (Math.random() - 0.5) * thickness * 2,
                        z: Math.sin(a) * r,
                        size: 0.2 + Math.random() * 1.8 * (1 - r / 700),
                        brightness: 0.1 + Math.random() * 0.9,
                        twinkleSpeed: 0.005 + Math.random() * 0.02,
                        twinklePhase: Math.random() * Math.PI * 2,
                        hue: 200 + Math.random() * 60
                    });
                }

                const dustCount = 400;
                for (let i = 0; i < dustCount; i++) {
                    const r = 50 + Math.random() * 550;
                    const a = Math.random() * Math.PI * 2;
                    const thickness = (1 - r / 600) * 50 + 10;
                    this.dusts.push({
                        x: Math.cos(a) * r,
                        y: (Math.random() - 0.5) * thickness * 2,
                        z: Math.sin(a) * r,
                        size: 3 + Math.random() * 20,
                        alpha: 0.008 + Math.random() * 0.03,
                        hue: 210 + Math.random() * 40,
                        pulseSpeed: 0.002 + Math.random() * 0.005,
                        pulsePhase: Math.random() * Math.PI * 2
                    });
                }

                this.bulgeStars = [];
                for (let i = 0; i < 300; i++) {
                    const r = Math.pow(Math.random(), 1.5) * 120;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.random() * Math.PI;
                    this.bulgeStars.push({
                        x: Math.sin(phi) * Math.cos(theta) * r,
                        y: Math.sin(phi) * Math.sin(theta) * r * 0.6,
                        z: Math.cos(phi) * r,
                        size: 0.3 + Math.random() * 1.2,
                        brightness: 0.3 + Math.random() * 0.7,
                        hue: 180 + Math.random() * 80
                    });
                }
            }

            draw(ctx, time) {
                for (let i = 0; i < 7; i++) {
                    const offset = (i - 3) * 70;
                    const p = project(offset, 0, 0);
                    if (p.z > -FOV) {
                        const radius = 120 + i * 35;
                        const sc = p.scale * 1.5;
                        const grad = ctx.createRadialGradient(p.sx, p.sy, 0, p.sx, p.sy, radius * sc);
                        const alpha = 0.05 - i * 0.006;
                        if (alpha > 0) {
                            grad.addColorStop(0, `rgba(120, 150, 255, ${alpha})`);
                            grad.addColorStop(0.5, `rgba(80, 110, 220, ${alpha * 0.5})`);
                            grad.addColorStop(1, 'rgba(0,0,0,0)');
                            ctx.beginPath();
                            ctx.arc(p.sx, p.sy, radius * sc, 0, Math.PI * 2);
                            ctx.fillStyle = grad;
                            ctx.fill();
                        }
                    }
                }

                ctx.save();
                for (let i = 0; i < 16; i++) {
                    const r = 50 + i * 35;
                    const a = (i / 16) * Math.PI * 2 + time * 0.00005;
                    const px = Math.cos(a) * r;
                    const pz = Math.sin(a) * r;
                    const p = project(px, 0, pz);
                    if (p.z > -FOV) {
                        const sz = 15 + r * 0.12;
                        const grad = ctx.createRadialGradient(p.sx, p.sy, 0, p.sx, p.sy, sz * p.scale);
                        const alpha = 0.07 * (1 - r / 600);
                        grad.addColorStop(0, `rgba(150, 180, 255, ${alpha})`);
                        grad.addColorStop(1, 'rgba(0,0,0,0)');
                        ctx.beginPath();
                        ctx.arc(p.sx, p.sy, sz * p.scale, 0, Math.PI * 2);
                        ctx.fillStyle = grad;
                        ctx.fill();
                    }
                }
                ctx.restore();

                for (const d of this.dusts) {
                    const p = project(d.x, d.y, d.z);
                    if (p.z > -FOV && p.scale > 0.1) {
                        const alpha = d.alpha * (0.6 + 0.4 * Math.sin(time * d.pulseSpeed + d.pulsePhase));
                        const size = d.size * p.scale;
                        if (size > 0.3) {
                            ctx.beginPath();
                            ctx.arc(p.sx, p.sy, size, 0, Math.PI * 2);
                            ctx.fillStyle = `hsla(${d.hue}, 40%, 65%, ${alpha * p.scale})`;
                            ctx.fill();
                        }
                    }
                }

                for (const s of this.particles) {
                    const p = project(s.x, s.y, s.z);
                    if (p.z > -FOV && p.scale > 0.05) {
                        const brightness = s.brightness * (0.5 + 0.5 * Math.sin(time * s.twinkleSpeed + s.twinklePhase));
                        const alpha = brightness * 0.7 * p.scale;
                        const size = s.size * p.scale;
                        if (size > 0.15 && alpha > 0.02) {
                            ctx.beginPath();
                            ctx.arc(p.sx, p.sy, size * 0.6, 0, Math.PI * 2);
                            ctx.fillStyle = `hsla(${s.hue}, 60%, 85%, ${alpha})`;
                            ctx.fill();
                        }
                    }
                }

                for (const s of this.bulgeStars) {
                    const p = project(s.x, s.y, s.z);
                    if (p.z > -FOV && p.scale > 0.1) {
                        const alpha = s.brightness * 0.6 * p.scale;
                        const size = s.size * p.scale;
                        if (size > 0.2) {
                            ctx.beginPath();
                            ctx.arc(p.sx, p.sy, size * 0.6, 0, Math.PI * 2);
                            ctx.fillStyle = `hsla(${s.hue}, 70%, 80%, ${alpha})`;
                            ctx.fill();
                        }
                    }
                }
            }
        }

        // ============ 星云（3D版）============
        class Nebula3D {
            constructor() {
                const radius = 300 + Math.random() * 400;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;
                this.x = Math.sin(phi) * Math.cos(theta) * radius;
                this.y = Math.sin(phi) * Math.sin(theta) * radius * 0.5;
                this.z = Math.cos(phi) * radius;
                this.radius = 60 + Math.random() * 150;
                this.hue = Math.random() * 360;
                this.alpha = 0.02 + Math.random() * 0.04;
                this.pulse = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.003 + Math.random() * 0.008;
            }
            update() {
                this.pulse += this.pulseSpeed;
            }
            draw(ctx, time) {
                const p = project(this.x, this.y, this.z);
                if (p.z > -FOV && p.scale > 0.1) {
                    const alpha = this.alpha * (0.6 + 0.4 * Math.sin(this.pulse));
                    const radius = this.radius * p.scale * (1 + 0.1 * Math.sin(this.pulse * 0.7));
                    const a = alpha * p.scale * 1.5;
                    const grad = ctx.createRadialGradient(p.sx, p.sy, 0, p.sx, p.sy, radius);
                    grad.addColorStop(0, `hsla(${this.hue}, 70%, 65%, ${a})`);
                    grad.addColorStop(0.3, `hsla(${this.hue}, 60%, 55%, ${a * 0.5})`);
                    grad.addColorStop(0.7, `hsla(${this.hue}, 50%, 45%, ${a * 0.2})`);
                    grad.addColorStop(1, `hsla(${this.hue}, 40%, 40%, 0)`);
                    ctx.beginPath();
                    ctx.arc(p.sx, p.sy, radius, 0, Math.PI * 2);
                    ctx.fillStyle = grad;
                    ctx.fill();
                }
            }
        }

        // ============ 星星（3D版）============
        class Star3D {
            constructor() {
                this.reset();
            }
            reset() {
                const radius = 200 + Math.random() * 1400;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                this.x = Math.sin(phi) * Math.cos(theta) * radius;
                this.y = Math.sin(phi) * Math.sin(theta) * radius * 0.7;
                this.z = Math.cos(phi) * radius;
                this.size = 0.2 + Math.random() * 2.5;
                this.baseBrightness = 0.3 + Math.random() * 0.7;
                this.brightness = this.baseBrightness;
                this.twinkleSpeed = 0.005 + Math.random() * 0.025;
                this.twinklePhase = Math.random() * Math.PI * 2;
                this.hexColor = starColors[Math.floor(Math.random() * starColors.length)];
                this.r = parseInt(this.hexColor.slice(1,3), 16);
                this.g = parseInt(this.hexColor.slice(3,5), 16);
                this.b = parseInt(this.hexColor.slice(5,7), 16);
                this.mode = Math.floor(Math.random() * 3);
                this.pulseOffset = Math.random() * 100;
            }
            update() {
                this.twinklePhase += this.twinkleSpeed;
                if (this.mode === 0) {
                    this.brightness = this.baseBrightness * (0.7 + 0.3 * Math.sin(this.twinklePhase));
                } else if (this.mode === 1) {
                    this.brightness = this.baseBrightness * (0.4 + 0.6 * Math.abs(Math.sin(this.twinklePhase)));
                } else {
                    this.brightness = this.baseBrightness * (0.5 + 0.5 * Math.sin(this.twinklePhase * 1.5 + this.pulseOffset));
                }
            }
            draw(ctx, time) {
                const p = project(this.x, this.y, this.z);
                if (p.z < -FOV || p.scale < 0.02) return;

                const alpha = this.brightness * Math.min(1, p.scale * 2);
                const size = this.size * p.scale * (0.8 + 0.4 * Math.sin(this.twinklePhase * 0.5));
                if (size < 0.15) return;

                const { r, g, b } = this;

                if (size > 1.2) {
                    const glowSize = size * 3;
                    const grad = ctx.createRadialGradient(p.sx, p.sy, 0, p.sx, p.sy, glowSize);
                    grad.addColorStop(0, `rgba(${r},${g},${b},${alpha * 0.5})`);
                    grad.addColorStop(0.5, `rgba(${r},${g},${b},${alpha * 0.1})`);
                    grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
                    ctx.beginPath();
                    ctx.arc(p.sx, p.sy, glowSize, 0, Math.PI * 2);
                    ctx.fillStyle = grad;
                    ctx.fill();
                }

                ctx.beginPath();
                ctx.arc(p.sx, p.sy, size * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                ctx.fill();

                if (size > 1.8) {
                    ctx.save();
                    ctx.globalAlpha = alpha * 0.25;
                    ctx.strokeStyle = `rgba(${r},${g},${b},${alpha * 0.15})`;
                    ctx.lineWidth = 0.5;
                    const len = size * 3;
                    for (let i = 0; i < 4; i++) {
                        const angle = (i / 4) * Math.PI + this.twinklePhase * 0.1;
                        ctx.beginPath();
                        ctx.moveTo(p.sx - Math.cos(angle) * len, p.sy - Math.sin(angle) * len);
                        ctx.lineTo(p.sx + Math.cos(angle) * len, p.sy + Math.sin(angle) * len);
                        ctx.stroke();
                    }
                    ctx.restore();
                }
            }
        }

        // ============ 流星（3D版）============
        class ShootingStar3D {
            constructor() {
                this.reset();
            }
            reset() {
                this.active = false;
                this.timer = 0;
                this.waitTime = 100 + Math.random() * 400;
            }
            spawn() {
                this.active = true;
                const angle = -Math.PI / 4 + Math.random() * Math.PI / 3;
                const spreadAngle = Math.random() * Math.PI * 2;
                const dist = 500 + Math.random() * 500;
                this.x = Math.cos(spreadAngle) * dist * 0.5;
                this.y = 100 + Math.random() * 200;
                this.z = -dist;
                this.speed = 15 + Math.random() * 25;
                this.vx = Math.cos(angle) * this.speed * Math.cos(spreadAngle) * 0.5;
                this.vy = -Math.sin(angle) * this.speed * 0.5;
                this.vz = this.speed;
                this.life = 1.0;
                this.decay = 0.005 + Math.random() * 0.01;
                this.hue = 190 + Math.random() * 60;
                this.size = 1.5 + Math.random() * 2.5;
                this.trail = [];
            }
            update() {
                if (!this.active) {
                    this.timer++;
                    if (this.timer > this.waitTime) {
                        this.spawn();
                    }
                    return;
                }
                this.trail.push({ x: this.x, y: this.y, z: this.z });
                if (this.trail.length > 25) this.trail.shift();

                this.x += this.vx;
                this.y += this.vy;
                this.z += this.vz;
                this.vy += 0.2;
                this.life -= this.decay;
                this.vx *= 0.99;
                this.vy *= 0.99;
                this.vz *= 0.99;

                if (this.life <= 0 || this.z > 800) {
                    this.active = false;
                    this.timer = 0;
                    this.trail = [];
                }
            }
            draw(ctx, time) {
                if (!this.active) return;
                if (this.trail.length < 2) return;

                const points = [];
                for (const t of this.trail) {
                    const p = project(t.x, t.y, t.z);
                    if (p.z > -FOV) points.push(p);
                }
                if (points.length < 2) return;

                for (let i = 1; i < points.length; i++) {
                    const alpha = (i / points.length) * this.life * 0.7;
                    const size = (i / points.length) * this.size * 0.6 * points[i].scale;
                    if (size > 0.2) {
                        ctx.beginPath();
                        ctx.arc(points[i].sx, points[i].sy, size, 0, Math.PI * 2);
                        ctx.fillStyle = `hsla(${this.hue}, 100%, 80%, ${alpha})`;
                        ctx.fill();
                    }
                }

                const head = points[points.length - 1];
                if (head) {
                    const headSize = this.size * (1 + 0.3 * Math.sin(Date.now() * 0.01)) * head.scale;
                    const grad = ctx.createRadialGradient(head.sx, head.sy, 0, head.sx, head.sy, headSize * 3);
                    grad.addColorStop(0, `hsla(${this.hue}, 100%, 95%, ${this.life})`);
                    grad.addColorStop(0.3, `hsla(${this.hue}, 100%, 80%, ${this.life * 0.5})`);
                    grad.addColorStop(1, `hsla(${this.hue}, 100%, 70%, 0)`);
                    ctx.beginPath();
                    ctx.arc(head.sx, head.sy, headSize * 3, 0, Math.PI * 2);
                    ctx.fillStyle = grad;
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(head.sx, head.sy, headSize * 0.5, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, 100%, 100%, ${this.life})`;
                    ctx.fill();
                }
            }
        }

        // ============ 鼠标星星 ============
        let mouseStars = [];

        function updateMouseStars() {
            for (let i = mouseStars.length - 1; i >= 0; i--) {
                const s = mouseStars[i];
                s.x += s.vx;
                s.y += s.vy;
                s.z += s.vz;
                s.vy += 0.05;
                s.vx *= 0.98;
                s.vy *= 0.98;
                s.vz *= 0.98;
                s.life -= 0.012;
                s.size *= 0.985;
                if (s.life <= 0 || s.size < 0.1) {
                    mouseStars.splice(i, 1);
                }
            }
        }

        function drawMouseStars(ctx, time) {
            for (const s of mouseStars) {
                const p = project(s.x, s.y, s.z);
                if (p.z > -FOV && p.scale > 0.05) {
                    const size = s.size * p.scale;
                    const alpha = s.life * p.scale;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.shadowColor = `hsla(${s.hue}, 80%, 70%, ${alpha})`;
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(p.sx, p.sy, size, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${s.hue}, 80%, 75%, ${alpha})`;
                    ctx.fill();
                    ctx.restore();
                }
            }
        }

        // ============ 初始化 ============
        let milkyWay;
        let starMap;

        function init() {
            milkyWay = new MilkyWay3D();
            starMap = new StarMap();

            for (let i = 0; i < MAX_STARS; i++) {
                stars.push(new Star3D());
            }
            for (let i = 0; i < 10; i++) {
                shootingStars.push(new ShootingStar3D());
                if (i < 4) {
                    shootingStars[i].timer = Math.random() * 100;
                }
            }
            for (let i = 0; i < 6; i++) {
                nebulae.push(new Nebula3D());
            }
        }

        function drawBackground() {
            const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.8);
            grad.addColorStop(0, '#0a0a2e');
            grad.addColorStop(0.3, '#050520');
            grad.addColorStop(0.6, '#020212');
            grad.addColorStop(1, '#000000');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
        }

        // ============ 主循环 ============
        let firstGenDone = false;

        function animate() {
            const time = Date.now();

            if (autoRotate) {
                targetRotY += autoRotateSpeed;
            } else if (!isDragging) {
                targetRotY += dragVX;
                targetRotX += dragVY;
                dragVX *= 0.95;
                dragVY *= 0.95;
            }
            rotY += (targetRotY - rotY) * 0.1;
            rotX += (targetRotX - rotX) * 0.1;

            drawBackground();

            // 1. 银河
            milkyWay.draw(ctx, time);

            // 2. 星云
            for (const n of nebulae) {
                n.update();
                n.draw(ctx, time);
            }

            // 3. 星星
            for (const star of stars) {
                star.update();
                star.draw(ctx, time);
            }

            // 4. 动态星图
            if (!firstGenDone && stars.length > 0) {
                setTimeout(() => { starMap.generate(stars); }, 300);
                firstGenDone = true;
            }
            starMap.update(stars, time);
            starMap.draw(ctx, time);

            // 5. 流星
            for (const s of shootingStars) {
                s.update();
                s.draw(ctx, time);
            }

            // 6. 鼠标星星
            updateMouseStars();
            drawMouseStars(ctx, time);

            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
